pdf.contract_notice.rescission.title=LEASE RESCISSION AGREEMENT
pdf.contract_notice.rescission.opening=By this private instrument, %s and %s, hereinafter referred to as tenant(s), agree to the following:
pdf.contract_notice.rescission.clause1=1. the parties entered into a private lease agreement on %s, pursuant to which they agreed to the %s lease of the property located at %s, for a term of %s, starting on %s and ending on %s.
pdf.contract_notice.rescission.clause2=2. as neither party wishes to maintain the lease agreement, they have mutually agreed to rescind it as of this date.
pdf.contract_notice.rescission.clause3=3. the landlord hereby declares receipt of the property keys and grants full, general and irrevocable discharge, waiving any further claims arising from the rescinded agreement, at any time, on any grounds.
pdf.contract_notice.rescission.clause4=4. upon this rescission, the landlord may dispose of the property as deemed fit.
pdf.contract_notice.rescission.clause5=5. the courts of %s are hereby elected to settle any dispute arising from this rescission.
pdf.contract_notice.rescission.closing=In witness whereof, the parties sign this instrument in 2 (two) counterparts of equal effect, in the presence of the witnesses below.
pdf.contract_notice.termination.title=TO
pdf.contract_notice.termination.body=As landlord of the %s property located at %s, leased under a written contract dated %s, with a scheduled end date of %s, and in order to protect my rights and make my intentions clear, I hereby give notice of TERMINATION of the lease. I have no intention of renewing it and grant a period of 30 (thirty) days for the property to be vacated, under penalty of eviction proceedings (Law 8245/91). Rental expenses shall continue to be paid at the same time and location until the final handover of keys and conclusion of the contract after the final inspection to be scheduled between the parties.
pdf.contract_notice.termination.body.plural=As landlords of the %s property located at %s, leased under a written contract dated %s, with a scheduled end date of %s, and in order to protect our rights and make our intentions clear, we hereby give notice of TERMINATION of the lease. We have no intention of renewing it and grant a period of 30 (thirty) days for the property to be vacated, under penalty of eviction proceedings (Law 8245/91). Rental expenses shall continue to be paid at the same time and location until the final handover of keys and conclusion of the contract after the final inspection to be scheduled between the parties.
pdf.contract_notice.termination.closing=Sincerely,
pdf.contract.terms_text=The parties to this instrument, duly identified and herein qualified, agree to the present lease agreement under the following terms and conditions.<br><br><b>FIRST</b> - The term of this lease is as stated at the beginning of this agreement. Upon the indicated end date, the tenant is obligated to vacate the property free of persons and belongings, in the same condition as received, without the need for any judicial or extrajudicial notice, except in the event of a written lease renewal.<br><br><b>SOLE PARAGRAPH</b> - Should the tenant fail to vacate the property at the end of the contractual term, the tenant shall pay the agreed monthly rent as adjusted under Clause Seventeenth until actual vacation of the property.<br><br><b>SECOND</b> - All taxes and fees currently levied on the leased property, as well as any increases or new taxes imposed by public authorities, shall be the sole responsibility of the tenant, who undertakes to pay them to the landlord in time for their timely discharge. The tenant is also responsible for water, electricity, gas, and condominium fees, if applicable.<br><br><b>FIRST PARAGRAPH</b> - The tenant shall be responsible for any expenses and fines resulting from delayed receipt of tax and assessment notices relating to the leased property.<br><br><b>SECOND PARAGRAPH</b> - Receipts for taxes and fees shall be delivered together with the corresponding month's rent, forming an integral part thereof.<br><br><b>THIRD</b> - Failure to pay rent and charges on the dates specified above shall automatically constitute the tenant in default, without the need for any notice, judicial summons, or extrajudicial demand.<br><br><b>SOLE PARAGRAPH</b> - A late fee of 10% shall apply after the rent due date. After 5 days, an additional 0.2% per day shall be charged. After 30 days, the matter will be referred to the Company's Legal Department.<br><br><b>FOURTH</b> - With the exception of works or repairs necessary for the structural safety of the property, the tenant shall be responsible for all other maintenance and shall keep the leased property and its fixtures in perfect working order, condition, and cleanliness, particularly sanitary and electrical installations, glass, and paintwork, as acknowledged by the tenant and guarantor.<br><br><b>FIFTH</b> - All improvements made, excluding professional installations and movable furnishings, shall become part of the property without entitling the tenant to any compensation or payment. Any such improvements require the landlord's prior written consent.<br><br><b>SOLE PARAGRAPH</b> - Upon termination of the lease, the tenant shall return the property in the same condition as received. If the tenant fails to do so, the landlord is hereby authorized to carry out all necessary repairs and charge the cost to the tenant as a lease expense.<br><br><b>SIXTH</b> - The building's internal regulations, in the case of a condominium, form an integral part of this agreement and are hereby acknowledged and accepted by the tenant.<br><br><b>SEVENTH</b> - The tenant is expressly prohibited from subletting, assigning, or otherwise transferring the property or this agreement, in whole or in part, whether for free or for consideration, or from using it for any purpose other than as specified in this agreement, without the landlord's prior written consent.<br><br><b>EIGHTH</b> - In the event of expropriation of the leased property, the landlord and its managers and/or attorneys shall be released from all liability arising from this agreement, and the tenant's recourse shall lie solely against the expropriating authority.<br><br><b>NINTH</b> - The landlord, personally or through representatives, is authorized to inspect the property at any time deemed appropriate.<br><br><b>TENTH</b> - The tenant undertakes, at their sole expense, to comply with any requirements imposed by public authorities regarding activities carried out on the property, assuming full responsibility for any violations resulting from non-compliance with the determinations of competent authorities.<br><br><b>ELEVENTH</b> - The tenant hereby acknowledges that the acceptance of receipts at a later date does not constitute a waiver of any other obligations stipulated in this agreement that were not collected at the appropriate time, particularly the charges established herein.<br><br><b>TWELFTH</b> - If the landlord, for the benefit of the tenant, tolerates any delay in the payment of rent or other charges, or in the fulfillment of any other contractual obligation, such tolerance shall not be construed as an amendment to this agreement nor give the guarantor grounds to invoke any legal release provision, as it shall constitute a mere act of goodwill on the part of the landlord.<br><br><b>THIRTEENTH</b> - Any amounts owed under this agreement shall be collected through enforcement proceedings or appropriate legal action in the jurisdiction where the property is located, to the exclusion of any other jurisdiction, with the losing party responsible for all judicial and extrajudicial costs in addition to the principal and the penalty stipulated in the Fourteenth Clause, plus 20% in attorney's fees.<br><br><b>FOURTEENTH</b> - A penalty of 3 (three) months' rent at the value in effect at the time of the breach shall apply to the party that violates any clause of this agreement, without prejudice to the innocent party's right to simultaneously consider the lease terminated, without any further judicial or extrajudicial formality. The penalty is always payable in full regardless of how much time has elapsed under this agreement, and its payment does not waive the obligation to pay outstanding rent and related costs.<br><br><b>FIFTEENTH</b> - As guarantee, the person identified as guarantor at the beginning of this agreement also signs, jointly and severally with the tenant for all obligations assumed herein.<br><br><b>SOLE PARAGRAPH</b> - It is expressly agreed that the guarantor's liability shall remain in full, without interruption and without limitation of time, until actual vacation of the property, on equal terms with the tenant, including in the event of any extension of this lease; the guarantor hereby waives any right to be released from the guarantee.<br><br><b>SIXTEENTH</b> - In the event of the guarantor's death, bankruptcy, or insolvency, the tenant undertakes to present a suitable replacement within 30 (thirty) days, subject to the penalties set forth in the Fourteenth Clause of this agreement.<br><br><b>SEVENTEENTH</b> - The rent shall be adjusted annually by the highest official price index, with the adjustment term subject to modification by the parties provided it is permitted by Federal Authorities.<br><br><b>NOTE: </b>In the event of a late payment, tenants, guarantors and their respective spouses will be reported to the credit bureau.<br><br>In witness whereof, the parties, their heirs and successors, in agreement with all terms and conditions of this lease agreement, sign this instrument in 2 (two) copies having one single effect, in the presence of the witnesses below.

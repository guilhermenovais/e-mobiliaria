pdf.contract_notice.rescission.title=DISTRATO DE CONTRATO DE LOCAÇÃO
pdf.contract_notice.rescission.opening=Por este instrumento particular, %s e %s, doravante denominado(s) locatário(s), têm entre si como justo e contratado o que segue:
pdf.contract_notice.rescission.clause1=1. as partes firmaram entre si, em %s, instrumento particular de locação, ocasião em que pactuaram a locação %s do imóvel, sito à %s, pelo prazo de %s, com início em %s e término em %s.
pdf.contract_notice.rescission.clause2=2. não havendo mais interesse por parte dos contratantes em manter referido contrato de locação, resolveram, de comum acordo, rescindi-lo nesta data.
pdf.contract_notice.rescission.clause3=3. locador declara ter recebido nesta data as chaves do imóvel e dando plena, geral e irrevogável quitação, para nada mais reclamar em função do contrato rescindido, a qualquer tempo, seja a que título for.
pdf.contract_notice.rescission.clause4=4. por força da presente rescisão, o locador poderá dar ao imóvel o destino que lhe aprouver.
pdf.contract_notice.rescission.clause5=5. fica eleito o foro da comarca em %s para dirimir eventual litígio oriundo da presente rescisão.
pdf.contract_notice.rescission.closing=Assim, firmam o presente instrumento em 2 (duas) vias de igual teor, na presença das testemunhas abaixo.
pdf.contract_notice.termination.title=Ao(À) senhor(a)
pdf.contract_notice.termination.body=Na qualidade de locador do imóvel %s sito a %s, alugado a V. Sa. por contrato escrito, formalizado em %s, com prazo de encerramento na data %s, no intuito de prevenir responsabilidades, prover a conservação e ressalva de meus direitos, manifestando claramente minha intenção, comunico-lhe que DENUNCIO a locação, como denunciada, por término do contrato, não tenho interesse em continuá-la e concedo o prazo de 30 (trinta) dias para a desocupação do imóvel sob pena de ajuizamento da ação de despejo (lei 8245/91). As despesas referentes a locação do imóvel continuam a ser quitadas no mesmo local e data até a definitiva entrega das chaves e encerramento do contrato após vistoria final a ser agendada entre as partes.
pdf.contract_notice.termination.body.plural=Na qualidade de locadores do imóvel %s sito a %s, alugado a V. Sa. por contrato escrito, formalizado em %s, com prazo de encerramento na data %s, no intuito de prevenir responsabilidades, prover a conservação e ressalva de nossos direitos, manifestando claramente nossa intenção, comunicamos-lhe que DENUNCIAMOS a locação, como denunciada, por término do contrato, não temos interesse em continuá-la e concedemos o prazo de 30 (trinta) dias para a desocupação do imóvel sob pena de ajuizamento da ação de despejo (lei 8245/91). As despesas referentes a locação do imóvel continuam a ser quitadas no mesmo local e data até a definitiva entrega das chaves e encerramento do contrato após vistoria final a ser agendada entre as partes.
pdf.contract_notice.termination.closing=Cordialmente,
pdf.contract.terms_text=Os signatários deste instrumento, devidamente qualificados, tem entre si, justo e acertado o presente contrato de locação, mediante as cláusulas e condições a seguir estipuladas e aceitas.<br><br><b>PRIMEIRA</b> - O prazo desta locação é constante no início deste contrato. No término indicado, o locatário se obriga a entregar o imóvel livre e desembaraçado de coisas e pessoas, no estado em que o recebeu, independentemente de notificação ou interpelação judicial, ressalvada a hipótese de prorrogação de locação, o que somente se fará por escrito.<br><br><b>PARAGRAFO ÚNICO</b> - Caso o locatário não restitua o imóvel no fim do prazo contratual, pagará enquanto estiver na posse do mesmo o aluguel mensal e ajustado nos termos da cláusula Décima-Sétima, até a efetiva desocupação do imóvel objeto deste instrumento.<br><br><b>SEGUNDA</b> - Todos os impostos e taxas que atualmente recaem sobre imóvel locado, bem como qualquer aumento dos mesmos, ou novos que venham a ser criados pelo poder público, serão da inteira responsabilidade do locatário, que se obriga a pagá-los ao locador para que este os liquide em seus respectivos vencimentos. São ainda de responsabilidade do locatário as contas de água, luz, força e gás, assim como as despesas de condomínio, se houver.<br><br><b>PARÁGRAFO PRIMEIRO</b> - O locatário será responsável pelas despesas e multas decorrentes de eventuais retenções dos avisos de impostos, taxas e outros que já incidem ou venham a incidir sobre o imóvel objeto da presente locação.<br><br><b>PARÁGRAFO SEGUNDO</b> - Os recibos referentes aos impostos e taxas serão entregues juntamente com aluguel correspondente ao mês, fazendo parte integrante do mesmo.<br><br><b>TERCEIRA</b> - A falta de pagamento, nas épocas supra determinadas, dos aluguéis e encargos, por si só constituirá o locatário em mora, independentemente de qualquer notificação, interpelação ou aviso extrajudicial.<br><br><b>PARÁGRAFO ÚNICO</b> - Após o vencimento do aluguel, será cobrada a multa de 10%. Ultrapassando 5 dias será cobrado mais 0,2% ao dia. Após 30 dias, será encaminhado ao departamento Jurídico da Empresa.<br><br><b>QUARTA</b> - Executada as obras ou reparações que sejam necessárias à segurança do imóvel, obriga-se o locatário pelas demais, devendo manter o imóvel locado e seus pertencentes, que ora recebe, em perfeito estado de funcionamento, conservação e limpeza, notadamente as instalações sanitárias e elétricas, vidros e pintura, fato que é comprovado pelo locatário e seu fiador.<br><br><b>QUINTA - Todas as benfeitorias que forem feitas, excluídas naturalmente as de instalações de natureza profissional e móveis, ficarão integrados ao imóvel, sem que, por elas, tenham o locatário direito a qualquer indenização ou pagamento. A introdução de tais benfeitorias dependerá da autorização por escrito do locador.<br><br></b><b>PARÁGRAFO ÚNICO</b> - Quando do término da locação, o locatário restituirá o imóvel nas mesmas condições em que o recebe agora, ficando desde já convencionado que se não fizer, o locador estará autorizado a mandar executar todos os reparos necessários, cobrando do locatário a importância gasta, como encargos da locação.<br><br><b>SEXTA</b> - Faz parte integrante do presente contrato o regulamento interno do prédio, no caso de condomínio, que o locador reconhece e aceita.<br><br><b>SÉTIMA</b> - É expressamente vedado ao locatário sublocar o imóvel no todo ou em parte, cedê-lo a terceiros, seja a título gratuito ou oneroso, transferir o contrato ou dar destinação diversa do uso ou finalidade previstos neste contrato, sem prévia anuência por escrito do locador.<br><br><b>OITAVA</b> - No caso de desapropriação do imóvel objeto deste contrato, o locador e seus administradores e/ou procuradores ficarão exonerados de toda e qualquer responsabilidade decorrente deste contrato, ressalvando-se ao locatário a faculdade de agir tão somente contra o poder expropriante.<br><br><b>NONA</b> - Fica o locador, por si ou por seus prepostos autorizado a vistoriar o imóvel sempre que julgar conveniente.<br><br><b>DÉCIMA</b> - O locatário se obriga a satisfazer, por sua conta exclusiva, a qualquer exigência dos poderes públicos, em razão da atividade exercida no imóvel, assumindo toda a responsabilidade por quaisquer infrações em que incorrer a esse propósito, por inobservância das determinações das autoridades competentes.<br><br><b>DÉCIMA-PRIMEIRA</b> - O locatário declara, neste ato, ter pleno conhecimento de que o resgate de recibos posteriores não significa nem representa quitação de outras obrigações estipuladas no presente contrato, deixadas de cobrar nas épocas certas, principalmente os encargos fixados neste contrato.<br><br><b>DÉCIMA-SEGUNDA</b> - Se o locador admitir, em benefício do locatário, qualquer atraso no pagamento do aluguel e demais despesas que lhe incuba, ou no cumprimento de qualquer outra obrigação contratual, essa tolerância não poderá ser considerada como alteração das condições deste contrato, nem dará ensejo à invocação do Artigo 1.503- inciso I do código Civil Brasileiro por parte do fiador, pois constituirá em ato de mera liberalidade do locador.<br><br><b>DÉCIMA-TERCEIRA</b> - Tudo que for devido em razão deste contrato, será cobrado em processo executivo ou em ação apropriada, no foro da situação do imóvel, com renúncia de qualquer outro, por mais privilegiado que seja, correndo por conta da parte vencida, além do principal e da multa estipulada na Cláusula Décima-Quarta, todas despesas judiciais e extrajudiciais, mais 20% de honorários advocatícios.<br><br><b>DÉCIMA-QUARTA</b> - Fica estipulada a multa de 3 (três) aluguéis à época da infração, na qual incorrerá a parte que infringir qualquer uma das cláusulas deste contrato, ressalvada a parte inocente o direito de poder considerar simultaneamente reincidida a locação, independentemente de qualquer outra formalidade judicial ou extrajudicial. A multa será sempre paga integralmente, seja qual for o prazo já decorrido do presente contrato, ficando claro que o pagamento dessa multa não exime o pagamento dos aluguéis atrasados, além das despesas inerentes ao caso.<br><br><b>DÉCIMA-QUINTA</b> - Como garantia assina também na qualidade de fiador(es) o qualificado no início deste contrato, sendo solidário com locatário em todas as obrigações aqui assumidas.<br><br><b>PARÁGRAFO ÚNICO</b> - Fica desde já expressamente convencionado que, em qualquer hipótese, a responsabilidade do(s) fiador(es) permanecerá integral, sem solução de continuidade e sem limitação de tempo, sempre e até real efetiva entrega do imóvel, em igualdade de condições com afiançado, também na hipótese de prorrogar-se a presente locação, abrindo mão, desde já fiador da faculdade de exoneração prevista no Artigo 1.500 do Código Civil Brasileiro.<br><br><b>DÉCIMA-SEXTA</b> - No caso de morte, falência ou insolvência do fiador, o locatário se obriga a apresentar dentro de 30 (trinta) dias, substituto idôneo, a juízo do locador sob pena de incorrer nas sanções previstas na Cláusula Décima-Quarta do presente contrato.<br><br><b>DÉCIMA-SÉTIMA</b> - O aluguel será reajustado anualmente pelo maior índice oficial, sendo certo que o prazo de reajuste poderá ser alterado pelas partes, desde que permitido pelas Autoridades Federais.<br><br><b>OBS: </b>Em caso de atraso no aluguel, enviaremos para o SPC, locatários, fiadores e suas respectivas esposas.<br><br>E, por estarem justas, contratadas, cientes e de acordo com todas as cláusulas e condições do presente contrato de locação, as partes por si, seus herdeiros e sucessores assinam este instrumento de 2 (duas) vias para um só efeito, na presença de testemunhas abaixo.

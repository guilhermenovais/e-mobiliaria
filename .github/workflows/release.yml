name: Release

on:
  push:
    paths:
      - 'src/main/resources/version.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < src/main/resources/version.txt)" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: ./mvnw package -DskipTests -q

      - name: Collect runtime JARs
        shell: bash
        run: |
          mkdir -p target/app/lib
          ./mvnw dependency:copy-dependencies \
            -DoutputDirectory=target/app/lib \
            -DincludeScope=runtime \
            -DexcludeGroupIds=org.openjfx \
            -q
          cp "$(ls target/e-mobiliaria-*.jar | grep -v tests | head -1)" target/app/lib/

      - name: Download Windows JavaFX JARs
        shell: bash
        run: |
          for artifact in javafx-base javafx-controls javafx-fxml javafx-graphics javafx-media; do
            ./mvnw dependency:copy \
              -Dartifact="org.openjfx:${artifact}:21.0.6:jar:win" \
              -DoutputDirectory=target/app/lib \
              -q
          done

      - name: Build minimal JRE
        shell: bash
        run: |
          "$JAVA_HOME/bin/jlink" \
            --no-header-files --no-man-pages --compress zip-6 \
            --add-modules java.base,java.desktop,java.sql,java.net.http,java.logging,java.naming,java.management,java.xml,jdk.unsupported \
            --output target/app/runtime

      - name: Build ZIP
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p target/app/bin
          printf '@echo off\r\nset SCRIPT_DIR=%%~dp0\r\n"%%SCRIPT_DIR%%..\runtime\bin\java" --module-path "%%SCRIPT_DIR%%..\lib" --module com.guilherme.emobiliaria/com.guilherme.emobiliaria.EMobiliariaApplication\r\n' \
            > target/app/bin/app.bat
          cd target
          7z a -tzip "e-mobiliaria-${VERSION}.zip" app/
          cd ..

      - name: Build installer
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jpackage \
            --type exe \
            --name "e-Mobiliaria" \
            --app-version "$VERSION" \
            --runtime-image target/app/runtime \
            --module-path target/app/lib \
            --module com.guilherme.emobiliaria/com.guilherme.emobiliaria.EMobiliariaApplication \
            --dest target \
            --win-menu \
            --win-menu-group "e-Mobiliaria" \
            --win-dir-chooser \
            --win-console \
            --win-shortcut
          mv "target/e-Mobiliaria-${VERSION}.exe" "target/e-mobiliaria-${VERSION}-setup.exe"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="target/e-mobiliaria-${VERSION}.zip"
          EXE="target/e-mobiliaria-${VERSION}-setup.exe"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            gh release upload "$VERSION" "$ZIP" "$EXE" --clobber
          else
            gh release create "$VERSION" "$ZIP" "$EXE" --title "$VERSION"
          fi
